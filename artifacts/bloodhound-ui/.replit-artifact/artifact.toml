kind = "web"
previewPath = "/"
title = "Bloodhound"
version = "1.0.0"
id = "artifacts/bloodhound-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20035

[services.development]
run = "pnpm --filter @workspace/bloodhound-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bloodhound-ui", "run", "build" ]
publicDir = "artifacts/bloodhound-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20035"
BASE_PATH = "/"
